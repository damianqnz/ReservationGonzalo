<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Guest Selection Modal</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#9c1616",
            "background-light": "#f8f6f6",
            "background-dark": "#211111",
          },
          fontFamily: {
            "display": ["Plus Jakarta Sans", "sans-serif"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          boxShadow: {
            'soft': '0 -8px 30px rgba(26, 26, 46, 0.06)',
          }
        },
      },
    }
  </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased h-screen w-full overflow-hidden relative">
<!-- Background content simulation (Home Screen underneath) -->
<div class="h-full w-full p-6 opacity-30 pointer-events-none filter blur-sm">
<div class="w-full h-64 bg-slate-200 dark:bg-slate-800 rounded-xl mb-6"></div>
<div class="w-3/4 h-8 bg-slate-200 dark:bg-slate-800 rounded mb-4"></div>
<div class="w-1/2 h-4 bg-slate-200 dark:bg-slate-800 rounded mb-8"></div>
<div class="grid grid-cols-1 gap-4">
<div class="w-full h-40 bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
<div class="w-full h-40 bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
</div>
</div>
<!-- Modal Overlay -->
<div class="absolute inset-0 z-40 bg-[#1a1a2e]/40 transition-opacity duration-300"></div>
<!-- Bottom Sheet -->
<div class="absolute bottom-0 left-0 w-full z-50 transform transition-transform duration-300 translate-y-0">
<div class="bg-white dark:bg-slate-900 w-full rounded-t-3xl shadow-soft flex flex-col pt-3 pb-8 px-6 max-h-[85vh] overflow-y-auto">
<!-- Drag Handle -->
<div class="flex justify-center mb-6 w-full cursor-grab active:cursor-grabbing pb-2">
<div class="h-1.5 w-12 rounded-full bg-slate-300 dark:bg-slate-700"></div>
</div>
<!-- Header -->
<h2 class="text-xl font-bold text-slate-900 dark:text-white mb-6">Hóspedes</h2>
<!-- Stepper Rows Container -->
<div class="flex flex-col gap-6 mb-8">
<!-- Adults Row -->
<div class="flex items-center justify-between">
<div class="flex flex-col">
<span class="text-base font-semibold text-slate-900 dark:text-white">Adultos</span>
<span class="text-sm text-slate-500 dark:text-slate-400 mt-0.5">13+ anos</span>
</div>
<div class="flex items-center gap-4">
<!-- Minus Button (Active) -->
<button class="w-10 h-10 rounded-full border border-slate-300 dark:border-slate-600 flex items-center justify-center text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-all active:scale-95 touch-manipulation" type="button">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<!-- Value -->
<span class="w-6 text-center text-lg font-semibold text-slate-900 dark:text-white tabular-nums">2</span>
<!-- Plus Button -->
<button class="w-10 h-10 rounded-full border border-slate-300 dark:border-slate-600 flex items-center justify-center text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-all active:scale-95 touch-manipulation" type="button">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</div>
<div class="h-px w-full bg-slate-100 dark:bg-slate-800"></div>
<!-- Children Row -->
<div class="flex items-center justify-between">
<div class="flex flex-col">
<span class="text-base font-semibold text-slate-900 dark:text-white">Crianças</span>
<span class="text-sm text-slate-500 dark:text-slate-400 mt-0.5">2-12 anos</span>
</div>
<div class="flex items-center gap-4">
<!-- Minus Button (Disabled) -->
<button class="w-10 h-10 rounded-full border border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-300 dark:text-slate-600 opacity-50 cursor-not-allowed touch-manipulation" disabled="" type="button">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<!-- Value -->
<span class="w-6 text-center text-lg font-semibold text-slate-900 dark:text-white tabular-nums">0</span>
<!-- Plus Button -->
<button class="w-10 h-10 rounded-full border border-slate-300 dark:border-slate-600 flex items-center justify-center text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-all active:scale-95 touch-manipulation" type="button">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</div>
</div>
<!-- Footer CTA -->
<div class="mt-auto pt-4 pb-safe">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold text-base py-4 rounded-xl shadow-sm transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 active:scale-[0.98]" type="button">
          Guardar
        </button>
</div>
</div>
</div>
</body></html>
